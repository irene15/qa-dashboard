name: Weekly Trello Sync

on:
  schedule:
    - cron: "0 6 * * 5"   # Every Friday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          TRELLO_API_KEY:   ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN:     ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID:  ${{ secrets.TRELLO_BOARD_ID }}
        run: python sync.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html snapshot.json snapshot_quarter.json
          git diff --cached --quiet || git commit -m "chore: weekly data sync $(date -u '+%Y-%m-%d')"
          git push

      - name: Send index.html to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN:   ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:  ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python3 - <<'EOF'
          import os, requests

          token   = os.environ.get("SLACK_BOT_TOKEN", "")
          channel = os.environ.get("SLACK_CHANNEL_ID", "")
          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")

          with open("index.html", "rb") as f:
              content = f.read()

          # Step 1: get upload URL
          r1 = requests.get(
              "https://slack.com/api/files.getUploadURLExternal",
              headers={"Authorization": f"Bearer {token}"},
              params={"filename": "dashboard.html", "length": len(content)}
          )
          data1 = r1.json()
          print("getUploadURL:", data1.get("ok"), data1.get("error", ""))

          if not data1.get("ok"):
              print("Failed to get upload URL")
              exit(0)

          # Step 2: upload file
          r2 = requests.post(
              data1["upload_url"],
              data=content,
              headers={"Content-Type": "text/html"}
          )
          print("Upload status:", r2.status_code)

          # Step 3: complete upload and share to channel
          r3 = requests.post(
              "https://slack.com/api/files.completeUploadExternal",
              headers={"Authorization": f"Bearer {token}"},
              json={
                  "files": [{"id": data1["file_id"]}],
                  "channel_id": channel,
                  "initial_comment": "📊 *QA Dashboard updated* — open the file in your browser."
              }
          )
          data3 = r3.json()
          print("completeUpload:", data3.get("ok"), data3.get("error", ""))
          EOF

