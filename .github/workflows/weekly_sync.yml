name: Weekly Trello Sync

on:
  schedule:
    - cron: "0 6 * * 5"      # Every Friday at 06:00 UTC (08:00 CEST)
    - cron: "0 14 31 3 *"    # March 31 at 16:00 CEST (14:00 UTC)
    - cron: "0 14 30 6 *"    # June 30 at 16:00 CEST (14:00 UTC)
    - cron: "0 14 30 9 *"    # September 30 at 16:00 CEST (14:00 UTC)
    - cron: "0 15 31 12 *"   # December 31 at 16:00 CET (15:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests playwright && python -m playwright install chromium --with-deps

      - name: Run sync script
        env:
          TRELLO_API_KEY:  ${{ secrets.TRELLO_API_KEY }}
          TRELLO_TOKEN:    ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}
        run: python sync.py

      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html snapshot.json snapshot_quarter.json
          git diff --cached --quiet || git commit -m "chore: weekly data sync $(date -u '+%Y-%m-%d')"
          git push

      - name: Take screenshot of dashboard
        env:
          QUARTER_SCREENSHOT: ${{ contains(github.event.schedule, '14 31 3') || contains(github.event.schedule, '14 30 6') || contains(github.event.schedule, '14 30 9') || contains(github.event.schedule, '15 31 12') }}
        run: python screenshot.py

      - name: Send screenshot to Slack
        env:
          SLACK_BOT_TOKEN:  ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python slack_notify.py
